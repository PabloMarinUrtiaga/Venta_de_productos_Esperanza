{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Email enviado — Esperanza</title>
  <link rel="stylesheet" href="{% static 'productos/css/estilos.css' %}"/>
</head>
<body class="login-page">

  <div class="auth-card" style="text-align:center;">
    <div style="font-size:3.5rem; margin-bottom:1rem;">📧</div>
    <div class="auth-logo" style="color:var(--oscuro);">ESPE<span style="color:var(--oscuro);">RANZA</span></div>
    <p class="auth-subtitulo">Revisá tu bandeja de entrada</p>

    <div class="auth-msg auth-success" style="display:block; text-align:left;">
      ✅ Te enviamos un email con el link para restablecer tu contraseña.
    </div>

    <p style="font-size:0.85rem; color:var(--gris); font-weight:600; line-height:1.7; margin-bottom:1.5rem;">
      Si no lo encontrás en unos minutos, revisá la carpeta de <strong>spam</strong> o <strong>correo no deseado</strong>.
    </p>

    <a href="/login/" class="btn-auth" style="display:block; text-align:center; text-decoration:none;">
      Volver al login
    </a>
  </div>

</body>
</html>
