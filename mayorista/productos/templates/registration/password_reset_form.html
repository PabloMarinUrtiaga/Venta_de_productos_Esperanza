{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Recuperar contraseña — Esperanza</title>
  <link rel="stylesheet" href="{% static 'productos/css/estilos.css' %}"/>
</head>
<body class="login-page">

  <div class="auth-card">
    <div class="auth-logo" style="color:var(--oscuro);">ESPE<span style="color:var(--oscuro);">RANZA</span></div>
    <p class="auth-subtitulo">Recuperá tu contraseña</p>

    <p style="font-size:0.88rem; color:var(--gris); font-weight:600; text-align:center; margin-bottom:1.5rem; line-height:1.6;">
      Ingresá tu email y te enviaremos un link para restablecer tu contraseña.
    </p>

    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="tu@email.com" required autocomplete="email"/>
      </div>
      <button type="submit" class="btn-auth">Enviar link →</button>
    </form>

    <div class="auth-link-row" style="margin-top:1.2rem;">
      <a href="/login/" style="color:var(--rojo); font-weight:800; text-decoration:none; font-size:0.82rem;">
        ← Volver al login
      </a>
    </div>
  </div>

</body>
</html>
