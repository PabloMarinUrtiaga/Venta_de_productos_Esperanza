{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contraseña actualizada — Esperanza</title>
  <link rel="stylesheet" href="{% static 'productos/css/estilos.css' %}"/>
</head>
<body class="login-page">

  <div class="auth-card" style="text-align:center;">
    <div style="width:80px; height:80px; background:var(--verde); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2.2rem; margin:0 auto 1.2rem; box-shadow:0 8px 32px rgba(46,204,113,0.35);">
      ✅
    </div>

    <div class="auth-logo" style="color:var(--oscuro);">ESPE<span style="color:var(--oscuro);">RANZA</span></div>
    <p class="auth-subtitulo">¡Contraseña actualizada!</p>

    <p style="font-size:0.88rem; color:var(--gris); font-weight:600; line-height:1.7; margin-bottom:1.5rem;">
      Tu contraseña fue cambiada con éxito. Ya podés ingresar con tus nuevas credenciales.
    </p>

    <a href="/login/" class="btn-auth" style="display:block; text-align:center; text-decoration:none;">
      Ingresar →
    </a>
  </div>

</body>
</html>
